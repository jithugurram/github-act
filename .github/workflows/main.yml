name: app
on:
 push:
   branches: main

jobs:
  build:
    runs-on: ubuntu-latest
    
   steps:
      - name: checkout
        uses: actions/checkout@v1

      - name: setup-java
        uses: actions/setup-java@v1
        with: 
          distribution: 'termurin'
          java-version: '17'

      - name: verify-java
        run: java -version
      
      - name: maven-install
        run: maven clean istall -f MywebApp/pom.xml

      
       - name: Deploy to Tomcat
         run: |
           curl -v -u ${{ secrets.TOMCAT_USER }}:${{ secrets.TOMCAT_PASSWORD }} \
           -T MyWebApp/target/MyWebApp.war \
           "http://${{ secrets.TOMCAT_HOST }}/manager/text/deploy?path=/MyWebApp&update=true"
   
